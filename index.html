<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>我的个人主页</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="page">
      <section class="intro">
        <p class="eyebrow">My First GitHub Page</p>
        <h1>你好，我是 zk</h1>
        <p class="lead">
          这是我的第一个 GitHub 项目。这里可以放我的个人介绍、学习记录和未来做出来的小作品。
        </p>
        <div class="actions">
          <a href="https://github.com/" target="_blank" rel="noreferrer">查看 GitHub</a>
          <a href="mailto:hello@example.com">联系我</a>
        </div>
      </section>

      <section class="panel" aria-label="主页内容">
        <div>
          <h2>关于我</h2>
          <p>
            我正在学习如何使用 GitHub 和 Codex，把想法慢慢变成可以运行、可以展示的作品。
          </p>
        </div>
        <div>
          <h2>我想做什么</h2>
          <ul>
            <li>记录学习过程</li>
            <li>制作简单网页</li>
            <li>保存自己的代码作品</li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
